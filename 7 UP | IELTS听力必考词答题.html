<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 UP｜IELTS—听力必考词</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0d14;
    --card: #111520;
    --card2: #161c2e;
    --border: #1e2740;
    --accent: #4f8fff;
    --accent2: #7c3aed;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e8eaf2;
    --muted: #6b7496;
    --muted2: #8892b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,143,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,143,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; min-height: 100vh; }

  /* ---- TOP NAV ---- */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,13,20,0.8);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { font-size: 17px; font-weight: 800; letter-spacing: 0.03em; color: var(--accent); }
  .nav-logo span { color: var(--muted2); font-weight: 400; font-size: 13px; }
  .nav-stats { display: flex; gap: 20px; font-size: 12px; color: var(--muted); }
  .nav-stats b { color: var(--text); font-size: 14px; }

  /* ---- SCREENS ---- */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ---- HOME SCREEN ---- */
  .home {
    max-width: 860px; margin: 0 auto;
    padding: 48px 24px 80px;
  }
  .home-hero {
    text-align: center; margin-bottom: 56px;
  }
  .home-hero h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 14px;
    background: linear-gradient(135deg, #e8eaf2 0%, #4f8fff 60%, #7c3aed 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .home-hero p { color: var(--muted2); font-size: 15px; line-height: 1.7; max-width: 480px; margin: 0 auto; }

  .overall-stats {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 16px;
    margin-bottom: 48px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
    text-align: center;
  }
  .stat-card .val { font-size: 32px; font-weight: 800; color: var(--accent); }
  .stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .days-section h2 {
    font-size: 14px; font-weight: 600; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .days-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .day-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 16px;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .day-card::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.2s;
  }
  .day-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .day-card:hover::after { opacity: 0.06; }
  .day-card .day-num { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .day-card .day-range { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
  .day-card .day-bar { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
  .day-card .day-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }
  .day-card .day-meta { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
  .day-card .day-meta .acc { font-weight: 700; }
  .day-card.done { border-color: rgba(34,197,94,0.3); }
  .day-card.done .day-num { color: var(--green); }
  .day-badge {
    position: absolute; top: 12px; right: 12px;
    width: 18px; height: 18px; border-radius: 50%;
    font-size: 10px; display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .day-badge.complete { background: rgba(34,197,94,0.2); color: var(--green); }

  /* ---- QUIZ SCREEN ---- */
  .quiz-wrap {
    max-width: 700px; margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .quiz-header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 32px;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--muted2); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .quiz-header-info { flex: 1; }
  .quiz-header-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .quiz-header-info p { font-size: 12px; color: var(--muted); }

  .progress-wrap { margin-bottom: 32px; }
  .progress-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .progress-top span:last-child { color: var(--text); font-weight: 700; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

  /* score strip */
  .score-strip {
    display: flex; gap: 10px; margin-bottom: 28px;
  }
  .score-chip {
    flex: 1; padding: 10px 0; border-radius: 10px;
    text-align: center; border: 1px solid var(--border);
    background: var(--card);
  }
  .score-chip .sc-val { font-size: 22px; font-weight: 800; }
  .score-chip .sc-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }
  .score-chip.correct { border-color: rgba(34,197,94,0.3); }
  .score-chip.correct .sc-val { color: var(--green); }
  .score-chip.wrong { border-color: rgba(239,68,68,0.3); }
  .score-chip.wrong .sc-val { color: var(--red); }
  .score-chip.acc { border-color: rgba(79,143,255,0.3); }
  .score-chip.acc .sc-val { color: var(--accent); }

  /* card */
  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px; padding: 40px 36px;
    margin-bottom: 24px;
    position: relative; overflow: hidden;
    min-height: 220px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .quiz-card::before {
    content: ''; position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(79,143,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .word-num { font-size: 11px; color: var(--muted); margin-bottom: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
  .word-en {
    font-size: clamp(32px, 8vw, 56px);
    font-weight: 800; letter-spacing: -0.02em;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 0%, #b0c4ff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }
  .word-hint { font-size: 13px; color: var(--muted); font-style: italic; }

  /* input area */
  .answer-area { margin-bottom: 20px; }
  .answer-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
  .answer-input {
    width: 100%; padding: 16px 20px;
    background: var(--card2); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-size: 18px; font-family: 'Noto Sans SC', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct-input { border-color: var(--green); background: rgba(34,197,94,0.06); }
  .answer-input.wrong-input { border-color: var(--red); background: rgba(239,68,68,0.06); }

  /* feedback */
  .feedback {
    border-radius: 12px; padding: 14px 18px;
    margin-bottom: 20px; font-size: 14px; line-height: 1.6;
    display: none; animation: slideUp 0.25s ease;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #86efac; }
  .feedback.wrong { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
  .feedback strong { display: block; font-size: 16px; margin-bottom: 4px; }
  @keyframes slideUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  /* option buttons (multiple choice mode) */
  .options-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 20px;
  }
  .opt-btn {
    padding: 14px 16px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--card2);
    color: var(--text); font-size: 15px;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer; transition: all 0.15s; text-align: left;
    line-height: 1.4;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(79,143,255,0.08); }
  .opt-btn.selected-correct { border-color: var(--green); background: rgba(34,197,94,0.12); color: #86efac; }
  .opt-btn.selected-wrong { border-color: var(--red); background: rgba(239,68,68,0.12); color: #fca5a5; }
  .opt-btn.reveal-correct { border-color: var(--green); background: rgba(34,197,94,0.08); }
  .opt-btn:disabled { cursor: default; }

  /* action buttons */
  .action-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 15px 20px; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    border: none; transition: all 0.15s;
    font-family: 'Sora', sans-serif;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--card2); color: var(--muted2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* mode toggle */
  .mode-toggle {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .mode-btn {
    flex: 1; padding: 9px; border-radius: 9px;
    font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    font-family: 'Sora', sans-serif;
  }
  .mode-btn.active { border-color: var(--accent); background: rgba(79,143,255,0.1); color: var(--accent); }

  /* ---- RESULT SCREEN ---- */
  .result-wrap {
    max-width: 600px; margin: 0 auto;
    padding: 48px 24px;
    text-align: center;
  }
  .result-emoji { font-size: 64px; margin-bottom: 20px; }
  .result-wrap h2 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .result-wrap p { color: var(--muted2); margin-bottom: 40px; font-size: 15px; }

  .result-big {
    font-size: 80px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1; margin-bottom: 6px;
  }
  .result-label { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

  .result-breakdown {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; margin-bottom: 32px;
    text-align: left;
  }
  .breakdown-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row .key { color: var(--muted2); }
  .breakdown-row .val { font-weight: 700; }
  .val.g { color: var(--green); }
  .val.r { color: var(--red); }
  .val.b { color: var(--accent); }

  /* wrong list */
  .wrong-list { text-align: left; margin-bottom: 32px; }
  .wrong-list h3 { font-size: 13px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .wrong-item {
    display: flex; justify-content: space-between;
    background: var(--card); border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px; padding: 12px 16px;
    margin-bottom: 8px; font-size: 14px;
  }
  .wrong-item .w-en { font-weight: 700; color: #fca5a5; }
  .wrong-item .w-zh { color: var(--muted2); font-size: 13px; }

  .result-actions { display: flex; gap: 12px; }

  /* ---- WORD BOOK SCREEN ---- */
  .wordbook-wrap {
    max-width: 800px; margin: 0 auto;
    padding: 32px 24px 80px;
  }
  .wordbook-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .wordbook-header h2 { font-size: 20px; font-weight: 800; }
  .wordbook-filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    font-family: 'Sora', sans-serif;
  }
  .filter-btn.active { border-color: var(--accent); background: rgba(79,143,255,0.1); color: var(--accent); }
  .word-table { width: 100%; border-collapse: collapse; }
  .word-table th {
    text-align: left; font-size: 11px; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .word-table td {
    padding: 12px 16px; border-bottom: 1px solid rgba(30,39,64,0.6);
    font-size: 14px;
  }
  .word-table tr:hover td { background: rgba(255,255,255,0.02); }
  .word-table .en-cell { font-weight: 700; font-size: 15px; }
  .word-table .zh-cell { color: var(--muted2); }
  .word-table .day-cell { color: var(--muted); font-size: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-dot.correct { background: var(--green); }
  .status-dot.wrong { background: var(--red); }
  .status-dot.untried { background: var(--muted); opacity: 0.4; }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 20px;
    font-size: 14px; color: var(--text);
    z-index: 999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ---- BOTTOM NAV ---- */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex;
    background: rgba(10,13,20,0.9); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 8px 0 12px; z-index: 99;
  }
  .bnav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 6px 0;
    cursor: pointer; background: none; border: none;
    color: var(--muted); font-size: 10px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: color 0.15s; font-family: 'Sora', sans-serif;
  }
  .bnav-btn .icon { font-size: 20px; line-height: 1; }
  .bnav-btn.active { color: var(--accent); }

  @media (max-width: 480px) {
    .quiz-card { padding: 28px 20px; }
    .options-grid { grid-template-columns: 1fr; }
    .overall-stats { grid-template-columns: 1fr 1fr 1fr; }
    .stat-card .val { font-size: 24px; }
    .days-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>
<div class="app">

  <!-- TOP NAV -->
  <nav class="nav">
    <div class="nav-logo">📚 7 UP <span>｜ IELTS 听力必考词</span></div>
    <div class="nav-stats">
      <div>总进度 <b id="nav-progress">0%</b></div>
      <div>正确率 <b id="nav-acc">—</b></div>
    </div>
  </nav>

  <!-- HOME SCREEN -->
  <div class="screen active" id="screen-home">
    <div class="home">
      <div class="home-hero">
        <h1>📚 7 UP<br><span style="font-size:0.6em;opacity:0.7">IELTS 听力必考词</span></h1>
        <p>每天20个单词，系统刷词，记录错题，追踪正确率</p>
      </div>

      <div class="overall-stats">
        <div class="stat-card">
          <div class="val" id="stat-done">0</div>
          <div class="lbl">已完成天数</div>
        </div>
        <div class="stat-card">
          <div class="val" id="stat-words">0</div>
          <div class="lbl">已练习单词</div>
        </div>
        <div class="stat-card">
          <div class="val" id="stat-acc">—</div>
          <div class="lbl">总体正确率</div>
        </div>
      </div>

      <div class="days-section">
        <h2>选择今天要练习的一天</h2>
        <div class="days-grid" id="days-grid"></div>
      </div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-wrap">
      <div class="quiz-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="quiz-header-info">
          <h3 id="quiz-title">第1天</h3>
          <p id="quiz-subtitle">单词 1-20</p>
        </div>
      </div>

      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-mc" onclick="setMode('mc')">📝 选择题</button>
        <button class="mode-btn" id="mode-type" onclick="setMode('type')">⌨️ 填写题</button>
      </div>

      <div class="progress-wrap">
        <div class="progress-top">
          <span id="q-progress-txt">第 1 题，共 20 题</span>
          <span id="q-progress-pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>

      <div class="score-strip">
        <div class="score-chip correct"><div class="sc-val" id="sc-correct">0</div><div class="sc-lbl">正确</div></div>
        <div class="score-chip wrong"><div class="sc-val" id="sc-wrong">0</div><div class="sc-lbl">错误</div></div>
        <div class="score-chip acc"><div class="sc-val" id="sc-acc">—</div><div class="sc-lbl">正确率</div></div>
      </div>

      <div class="quiz-card">
        <div class="word-num" id="word-num">单词 1 / 20</div>
        <div class="word-en" id="word-en">certificate</div>
        <div class="word-hint" id="word-hint">请选择或输入中文含义</div>
      </div>

      <!-- Multiple choice -->
      <div id="mc-area">
        <div class="options-grid" id="options-grid"></div>
      </div>

      <!-- Type area -->
      <div id="type-area" style="display:none">
        <div class="answer-area">
          <div class="answer-label">输入中文含义</div>
          <input class="answer-input" id="answer-input" type="text" placeholder="输入中文..." autocomplete="off" />
        </div>
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="action-row" id="action-row">
        <button class="btn btn-primary" id="btn-check" onclick="checkAnswer()">确认答案</button>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="screen-result">
    <div class="result-wrap">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <h2 id="result-title">今日完成！</h2>
      <p id="result-subtitle">继续保持，每天进步一点点</p>

      <div class="result-big" id="result-acc">80%</div>
      <div class="result-label">今日正确率</div>

      <div class="result-breakdown">
        <div class="breakdown-row"><span class="key">正确题数</span><span class="val g" id="r-correct">16</span></div>
        <div class="breakdown-row"><span class="key">错误题数</span><span class="val r" id="r-wrong">4</span></div>
        <div class="breakdown-row"><span class="key">练习单词</span><span class="val b" id="r-total">20</span></div>
        <div class="breakdown-row"><span class="key">最高连对</span><span class="val b" id="r-streak">8</span></div>
      </div>

  {en:"gymnast",zh:"体操运动员"},
  {en:"artistic",zh:"艺术的"},
  {en:"roar",zh:"咆哮，吼叫，轰鸣"},
  {en:"ribbon",zh:"缎带，带状物"},
  {en:"patent",zh:"专利，特许"},
  {en:"cylinder",zh:"气缸，圆柱体"},
];

const TOTAL = ALL_WORDS.length;
const PER_DAY = 20;
const NUM_DAYS = Math.ceil(TOTAL / PER_DAY);

// ============================================================
// STATE
// ============================================================
let progress = loadProgress();

let currentDay = 0;
let currentMode = 'mc'; // 'mc' or 'type'
let currentIdx = 0;
let dayWords = [];
let answered = false;
let sessionCorrect = 0;
let sessionWrong = 0;
let sessionWrongWords = [];
let maxStreak = 0;
let currentStreak = 0;
let retryMode = false;

function loadProgress() {
  try {
    const saved = localStorage.getItem('ielts_progress');
    return saved ? JSON.parse(saved) : {};
  } catch(e) { return {}; }
}

function saveProgress() {
  try {
    localStorage.setItem('ielts_progress', JSON.stringify(progress));
  } catch(e) {}
}

function getWordKey(word) { return word.en; }

function getDayWords(day) {
  const start = day * PER_DAY;
  return ALL_WORDS.slice(start, start + PER_DAY);
}

function getDayStats(day) {
  const words = getDayWords(day);
  let correct = 0, wrong = 0, tried = 0;
  words.forEach(w => {
    const p = progress[getWordKey(w)];
    if (p) {
      tried++;
      if (p.status === 'correct') correct++;
      else if (p.status === 'wrong') wrong++;
    }
  });
  return { correct, wrong, tried, total: words.length };
}

// ============================================================
// HOME SCREEN
// ============================================================
function renderHome() {
  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';

  let totalTried = 0, totalCorrect = 0, doneDays = 0;

  for (let d = 0; d < NUM_DAYS; d++) {
    const s = getDayStats(d);
    const pct = s.tried > 0 ? Math.round(s.correct / s.tried * 100) : 0;
    const done = s.tried === s.total;
    if (done) doneDays++;
    totalTried += s.tried;
    totalCorrect += s.correct;

    const startW = d * PER_DAY + 1;
    const endW = Math.min((d + 1) * PER_DAY, TOTAL);

    const card = document.createElement('div');
    card.className = 'day-card' + (done ? ' done' : '');
    card.innerHTML = `
      ${done ? '<div class="day-badge complete">✓</div>' : ''}
      <div class="day-num">第 ${d+1} 天</div>
      <div class="day-range">#${startW}–${endW}</div>
      <div class="day-bar">
        <div class="day-bar-fill" style="width:${s.tried/s.total*100}%;background:${done?'var(--green)':'linear-gradient(90deg,var(--accent),var(--accent2))'}"></div>
      </div>
      <div class="day-meta">
        <span>${s.tried}/${s.total} 词</span>
        <span class="acc" style="color:${pct>=80?'var(--green)':pct>=60?'var(--yellow)':'var(--red)'}">${s.tried>0?pct+'%':'—'}</span>
      </div>
    `;
    card.onclick = () => startDay(d);
    grid.appendChild(card);
  }

  // overall stats
  document.getElementById('stat-done').textContent = doneDays;
  document.getElementById('stat-words').textContent = totalTried;
  const overallAcc = totalTried > 0 ? Math.round(totalCorrect / totalTried * 100) + '%' : '—';
  document.getElementById('stat-acc').textContent = overallAcc;
  document.getElementById('nav-progress').textContent = Math.round(totalTried / TOTAL * 100) + '%';
  document.getElementById('nav-acc').textContent = overallAcc;
  document.getElementById('book-total').textContent = TOTAL;
}

// ============================================================
// QUIZ
// ============================================================
function startDay(day, retryWords) {
  currentDay = day;
  retryMode = !!retryWords;
  dayWords = retryWords || shuffle([...getDayWords(day)]);
  currentIdx = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  sessionWrongWords = [];
  maxStreak = 0;
  currentStreak = 0;

  const d = getDayWords(day);
  const startW = day * PER_DAY + 1;
  const endW = Math.min((day+1)*PER_DAY, TOTAL);
  document.getElementById('quiz-title').textContent = `第 ${day+1} 天${retryMode ? ' · 重练错题' : ''}`;
  document.getElementById('quiz-subtitle').textContent = `单词 ${startW}–${endW}`;

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  if (currentIdx >= dayWords.length) {
    showResult();
    return;
  }

  answered = false;
  const word = dayWords[currentIdx];
  const total = dayWords.length;

  // progress
  const pct = Math.round(currentIdx / total * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-progress-txt').textContent = `第 ${currentIdx+1} 题，共 ${total} 题`;
  document.getElementById('q-progress-pct').textContent = pct + '%';
  document.getElementById('word-num').textContent = `单词 ${currentIdx+1} / ${total}`;
  document.getElementById('word-en').textContent = word.en;
  document.getElementById('word-hint').textContent = '请选择或输入中文含义';

  // score
  document.getElementById('sc-correct').textContent = sessionCorrect;
  document.getElementById('sc-wrong').textContent = sessionWrong;
  const tried = sessionCorrect + sessionWrong;
  document.getElementById('sc-acc').textContent = tried > 0 ? Math.round(sessionCorrect/tried*100)+'%' : '—';

  // feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';

  if (currentMode === 'mc') {
    renderMC(word);
  } else {
    renderType(word);
  }
}

function renderMC(word) {
  document.getElementById('mc-area').style.display = 'block';
  document.getElementById('type-area').style.display = 'none';

  // Reset action row (no btn-check in MC mode)
  document.getElementById('action-row').innerHTML =
    '<button class="btn btn-secondary" onclick="skipWord()">跳过</button>';

  // Pick 3 distractors fresh every time
  const pool = ALL_WORDS.filter(w => w.en !== word.en);
  const wrongs = shuffle(pool).slice(0, 3).map(w => w.zh);
  const opts = shuffle([word.zh, ...wrongs]);

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => selectOption(btn, opt, word.zh);
    grid.appendChild(btn);
  });
}

function selectOption(btn, selected, correct) {
  if (answered) return;
  answered = true;

  // Lock all option buttons and highlight correct answer
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('reveal-correct');
  });

  const isCorrect = selected === correct;
  if (isCorrect) {
    btn.classList.add('selected-correct');
    markCorrect();
  } else {
    btn.classList.add('selected-wrong');
    markWrong();
  }

  showFeedback(isCorrect, correct, dayWords[currentIdx]);

  // Show Next button — user must click to advance
  document.getElementById('action-row').innerHTML = `
    <button class="btn btn-secondary" onclick="skipWord()" style="flex:0.4">重练</button>
    <button class="btn btn-primary" onclick="nextWord()" id="btn-next" autofocus>下一个 →</button>
  `;
  document.getElementById('btn-next').focus();
}

function renderType(word) {
  document.getElementById('mc-area').style.display = 'none';
  document.getElementById('type-area').style.display = 'block';

  // Rebuild action row first (creates btn-check fresh)
  document.getElementById('action-row').innerHTML =
    '<button class="btn btn-secondary" onclick="skipWord()" style="flex:0.4">跳过</button>' +
    '<button class="btn btn-primary" id="btn-check" onclick="checkAnswer()">确认答案</button>';

  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = 'answer-input';
  input.disabled = false;
  input.focus();
  input.onkeydown = (e) => { if (e.key === 'Enter') checkAnswer(); };
}

function checkAnswer() {
  if (answered) { nextWord(); return; } // double-click safety

  const word = dayWords[currentIdx];
  const input = document.getElementById('answer-input');
  const userAns = input.value.trim();

  if (!userAns) { showToast('请输入答案'); return; }

  answered = true;
  input.disabled = true;

  // Flexible matching: check if user answer overlaps with any part of zh
  const correctParts = word.zh.split(/[，,、；;]/);
  const isCorrect = correctParts.some(part => {
    const p = part.trim();
    return p && (userAns.includes(p) || p.includes(userAns));
  });

  if (isCorrect) {
    input.className = 'answer-input correct-input';
    markCorrect();
  } else {
    input.className = 'answer-input wrong-input';
    markWrong();
  }

  showFeedback(isCorrect, word.zh, word);

  document.getElementById('action-row').innerHTML = `
    <button class="btn btn-secondary" onclick="skipWord()" style="flex:0.5">重练</button>
    <button class="btn btn-primary" onclick="nextWord()">下一个 →</button>
  `;
}

function showFeedback(isCorrect, correctAns, word) {
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✅ 正确！</strong>${word.en} = ${correctAns}`;
    document.getElementById('word-hint').textContent = correctAns;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>❌ 错误</strong>正确答案：${correctAns}`;
    document.getElementById('word-hint').textContent = '→ ' + correctAns;
  }
}

function markCorrect() {
  sessionCorrect++;
  currentStreak++;
  if (currentStreak > maxStreak) maxStreak = currentStreak;
  const word = dayWords[currentIdx];
  progress[getWordKey(word)] = { status: 'correct', ts: Date.now() };
  saveProgress();
}

function markWrong() {
  sessionWrong++;
  currentStreak = 0;
  const word = dayWords[currentIdx];
  progress[getWordKey(word)] = { status: 'wrong', ts: Date.now() };
  sessionWrongWords.push(word);
  saveProgress();
}

function nextWord() {
  currentIdx++;
  renderQuestion();
}

function skipWord() {
  // put current word at end for retry
  const word = dayWords.splice(currentIdx, 1)[0];
  dayWords.push(word);
  answered = false;
  renderQuestion();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-mc').className = 'mode-btn' + (mode === 'mc' ? ' active' : '');
  document.getElementById('mode-type').className = 'mode-btn' + (mode === 'type' ? ' active' : '');
  renderQuestion();
}

// ============================================================
// RESULT
// ============================================================
function showResult() {
  const total = dayWords.length;
  const acc = total > 0 ? Math.round(sessionCorrect / total * 100) : 0;

  document.getElementById('result-acc').textContent = acc + '%';
  document.getElementById('r-correct').textContent = sessionCorrect;
  document.getElementById('r-wrong').textContent = sessionWrong;
  document.getElementById('r-total').textContent = total;
  document.getElementById('r-streak').textContent = maxStreak;

  let emoji = '😤', title = '继续加油！', sub = '错误较多，建议重练错题';
  if (acc >= 90) { emoji = '🏆'; title = '太棒了！'; sub = '正确率超高，继续保持！'; }
  else if (acc >= 75) { emoji = '🎉'; title = '完成今日练习！'; sub = '不错的成绩，继续加油！'; }
  else if (acc >= 60) { emoji = '💪'; title = '今日完成！'; sub = '有一些错题，建议重练'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-subtitle').textContent = sub;

  const wrongEl = document.getElementById('wrong-list');
  if (sessionWrongWords.length > 0) {
    wrongEl.innerHTML = `<h3>❌ 错题 (${sessionWrongWords.length}个)</h3>` +
      sessionWrongWords.map(w =>
        `<div class="wrong-item"><span class="w-en">${w.en}</span><span class="w-zh">${w.zh}</span></div>`
      ).join('');
  } else {
    wrongEl.innerHTML = '<div style="text-align:center;color:var(--green);font-size:28px;margin-bottom:8px">🎯</div><div style="text-align:center;color:var(--muted2);font-size:14px">全部答对，太厉害了！</div>';
  }

  const retryBtn = document.getElementById('btn-retry');
  if (retryBtn) retryBtn.style.display = sessionWrongWords.length > 0 ? 'block' : 'none';

  showScreen('result');
}

function retryWrong() {
  if (sessionWrongWords.length === 0) return;
  startDay(currentDay, shuffle([...sessionWrongWords]));
}

// ============================================================
// WORD BOOK
// ============================================================
let bookFilter = 'all';

function filterBook(f) {
  bookFilter = f;
  ['all','wrong','correct','untried'].forEach(id => {
    document.getElementById('f-'+id).className = 'filter-btn' + (f===id?' active':'');
  });
  renderBook();
}

function renderBook() {
  const tbody = document.getElementById('book-tbody');
  tbody.innerHTML = '';
  const dayMap = {};
  ALL_WORDS.forEach((w, i) => { dayMap[w.en] = Math.floor(i / PER_DAY) + 1; });

  ALL_WORDS.forEach(w => {
    const p = progress[getWordKey(w)];
    const status = p ? p.status : 'untried';
    if (bookFilter !== 'all' && status !== bookFilter) return;

    const dotClass = status === 'correct' ? 'correct' : status === 'wrong' ? 'wrong' : 'untried';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="en-cell">${w.en}</td>
      <td class="zh-cell">${w.zh}</td>
      <td class="day-cell">第${dayMap[w.en]}天</td>
      <td><span class="status-dot ${dotClass}"></span></td>
    `;
    tbody.appendChild(tr);
  });
}

// ============================================================
// NAVIGATION
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  if (name === 'home') { document.getElementById('bnav-home').classList.add('active'); renderHome(); }
  if (name === 'book') { document.getElementById('bnav-book').classList.add('active'); renderBook(); }
}

function goHome() {
  showScreen('home');
}

// ============================================================
// UTILS
// ============================================================
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// INIT
// ============================================================
renderHome();

// Keyboard: Space/Enter to go next after answering
document.addEventListener('keydown', (e) => {
  const quizActive = document.getElementById('screen-quiz').classList.contains('active');
  if (!quizActive) return;
  if (e.key === ' ' || e.key === 'Enter') {
    // Only if in MC mode and already answered
    if (currentMode === 'mc' && answered) {
      e.preventDefault();
      nextWord();
    }
  }
  // Number keys 1-4 to select options in MC mode
  if (currentMode === 'mc' && !answered) {
    const num = parseInt(e.key);
    if (num >= 1 && num <= 4) {
      const btns = document.querySelectorAll('.opt-btn');
      if (btns[num - 1]) btns[num - 1].click();
    }
  }
});
</script>
</body>
